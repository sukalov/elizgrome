settings:
  content:
    merge: true

media:
  - name: images
    label: Images
    input: src/assets/images
    output: src/assets/images
    extensions: [jpg, jpeg, png, webp]
    rename: safe

components:
  localized_string:
    type: object
    fields:
      - name: en
        label: English
        type: string
        required: true
      - name: ru
        label: Russian
        type: string
        required: true

  localized_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
        required: true
      - name: ru
        label: Russian
        type: text
        required: true

  localized_optional_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
      - name: ru
        label: Russian
        type: text

  image_upload:
    type: image
    description: "Upload jpg, jpeg, png, or webp only. Please keep the image under 1mb."
    options:
      media: images
      extensions: [jpg, jpeg, png, webp]
      rename: safe

  layout_point:
    type: object
    description: "Position in percent. Rotate is in degrees."
    fields:
      - name: x
        label: X position
        type: number
        required: true
      - name: y
        label: Y position
        type: number
        required: true
      - name: rotate
        label: Rotation
        type: number
        required: true

  responsive_layout:
    type: object
    fields:
      - name: desktop
        label: Desktop position
        component: layout_point
      - name: mobile
        label: Mobile position
        component: layout_point

  product_item:
    type: object
    fields:
      - name: id
        label: ID
        type: string
        required: true
        pattern: "^[a-z0-9-]+$"
      - name: alt
        label: Alt text
        component: localized_string
      - name: image
        label: Product image
        component: image_upload

content:
  - name: landing
    label: Landing page
    type: file
    path: src/content/landing.yaml
    format: yaml
    fields:
      - name: site
        label: Site settings
        type: object
        fields:
          - name: seo
            label: SEO
            type: object
            fields:
              - name: title
                label: Page title
                component: localized_string
              - name: description
                label: Meta description
                component: localized_text
              - name: og_image
                label: OG image
                component: image_upload
                required: false

          - name: navigation
            label: Navigation
            type: object
            fields:
              - name: logo
                label: Logo text
                component: localized_string
              - name: menu_label
                label: Mobile menu button label
                component: localized_string
              - name: search_label
                label: Search button label
                component: localized_string
              - name: language_label
                label: Language switcher label
                component: localized_string
              - name: promo_pack
                label: Promo pack link
                type: object
                fields:
                  - name: url
                    label: URL
                    type: string
                    required: true
                  - name: label
                    label: Label
                    component: localized_string
              - name: section_links
                label: Internal section links
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.label.en}"
                fields:
                  - name: target
                    label: Section id without #
                    type: string
                    required: true
                    pattern: "^[a-z0-9-]+$"
                  - name: label
                    label: Label
                    component: localized_string

      - name: sections
        label: Page sections
        type: object
        fields:
          - name: about
            label: About
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: hero
                label: Hero images
                type: object
                fields:
                  - name: desktop
                    label: Desktop hero image
                    component: image_upload
                  - name: mobile
                    label: Mobile hero image
                    component: image_upload
              - name: text
                label: About text
                component: localized_text

          - name: releases
            label: Releases
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: items
                label: Release items
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en} ({fields.year})"
                fields:
                  - name: id
                    label: ID
                    type: string
                    required: true
                    pattern: "^[a-z0-9-]+$"
                  - name: title
                    label: Title
                    component: localized_string
                  - name: year
                    label: Year
                    type: string
                    required: true
                  - name: image
                    label: Cover image
                    component: image_upload
                  - name: layout
                    label: Desktop layout
                    type: object
                    fields:
                      - name: desktop
                        label: Desktop position
                        component: layout_point

          - name: concerts
            label: Concerts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: items
                label: Concert items
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en}"
                fields:
                  - name: id
                    label: ID
                    type: string
                    required: true
                    pattern: "^[a-z0-9-]+$"
                  - name: title
                    label: Title
                    component: localized_string
                  - name: note
                    label: Note
                    component: localized_optional_text
                  - name: url
                    label: Optional URL
                    type: string
                  - name: style
                    label: Visual style
                    type: select
                    options:
                      values:
                        - name: primary
                          label: Primary
                        - name: secondary
                          label: Secondary
                  - name: layout
                    label: Layout
                    component: responsive_layout

          - name: merch
            label: Merch
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: order_label
                label: Order link label
                component: localized_string
              - name: groups
                label: Product groups
                type: object
                fields:
                  - name: shirts
                    label: T-shirts
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string
                      - name: items
                        label: Shirt items
                        component: product_item
                        list:
                          collapsible:
                            collapsed: true
                            summary: "{fields.id}"
                  - name: vinyl
                    label: Vinyl
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string
                      - name: items
                        label: Vinyl items
                        component: product_item
                        list:
                          collapsible:
                            collapsed: true
                            summary: "{fields.id}"
                  - name: picks
                    label: Picks
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string

          - name: contacts
            label: Contacts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: links
                label: Contact links
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.label}"
                fields:
                  - name: id
                    label: Icon
                    type: select
                    options:
                      values:
                        - name: instagram
                          label: Instagram
                        - name: telegram
                          label: Telegram
                        - name: tiktok
                          label: TikTok
                        - name: mail
                          label: Mail
                        - name: youtube
                          label: YouTube
                  - name: label
                    label: Label
                    type: string
                    required: true
                  - name: url
                    label: URL
                    type: string
                    required: true
                  - name: layout
                    label: Layout
                    component: responsive_layout
