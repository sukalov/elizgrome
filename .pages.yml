settings:
  content:
    merge: true

actions:
  - name: deploy-site
    label: Deploy site
    workflow: pages-cms-deploy.yml
    ref: current
    confirm:
      title: Deploy site?
      message: This will build the site and publish to GitHub Pages.
      button: Deploy

media:
  - name: images
    label: Images
    input: src/assets/images
    output: src/assets/images
    extensions: [webp]
    rename: safe

components:
  localized_string:
    type: object
    fields:
      - name: en
        label: English
        type: string
        required: true
      - name: ru
        label: Russian
        type: string
        required: true

  localized_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
        required: true
      - name: ru
        label: Russian
        type: text
        required: true

  localized_optional_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
      - name: ru
        label: Russian
        type: text

  image_upload:
    type: image
    description: "Upload webp only. JPG and PNG are not accepted; convert at https://compress-or-die.com"
    options:
      media: images
      extensions: [webp]
      rename: safe

  merch_image:
    type: object
    fields:
      - name: image
        label: Image
        component: image_upload
        required: true

  song:
    type: object
    fields:
      - name: title
        label: Song title
        component: localized_string
      - name: lyrics
        label: Lyrics
        type: text
        required: true

  layout_point:
    type: object
    description: "Position in percent (0–100)."
    fields:
      - name: x
        label: X position
        type: number
        required: true
      - name: y
        label: Y position
        type: number
        required: true

  responsive_layout:
    type: object
    fields:
      - name: desktop
        label: Desktop position
        component: layout_point
        required: true
      - name: mobile
        label: Mobile position
        component: layout_point
        required: true

content:
  - name: landing
    label: Landing page
    type: file
    path: src/content/landing.yaml
    format: yaml
    fields:
      - name: site
        label: Site
        type: object
        fields:
          - name: seo
            label: SEO
            type: object
            fields:
              - name: title
                label: Page title
                component: localized_string
              - name: description
                label: Meta description
                component: localized_text
          - name: promo_pack
            label: Promo pack link
            type: object
            fields:
              - name: url
                label: URL
                type: string
                required: true
              - name: label
                label: Label
                component: localized_string

      - name: sections
        label: Sections
        type: object
        fields:
          - name: about
            label: About
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: hero
                label: Hero images
                type: object
                fields:
                  - name: desktop
                    label: Desktop
                    component: image_upload
                  - name: mobile
                    label: Mobile
                    component: image_upload
              - name: text
                label: Text
                component: localized_text

          - name: releases
            label: Releases
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: items
                label: Releases
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en} ({fields.year})"
                fields:
                  - name: title
                    label: Title
                    component: localized_string
                  - name: year
                    label: Year
                    type: string
                    required: true
                  - name: image
                    label: Cover
                    component: image_upload
                  - name: songs
                    label: Songs
                    component: song
                    list:
                      collapsible:
                        collapsed: true
                        summary: "{fields.title.en}"
                  - name: layout
                    label: Desktop layout
                    type: object
                    required: true
                    fields:
                      - name: desktop
                        label: Desktop position
                        component: layout_point
                        required: true

          - name: concerts
            label: Concerts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: items
                label: Concerts
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en}"
                fields:
                  - name: title
                    label: Title
                    component: localized_string
                  - name: note
                    label: Location note (optional)
                    component: localized_optional_text
                  - name: url
                    label: Link (optional)
                    type: string
                  - name: layout
                    label: Layout
                    component: responsive_layout
                    required: true

          - name: merch
            label: Merch
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: order_link
                label: Order link
                type: object
                fields:
                  - name: ru
                    label: Russian label
                    type: string
                    required: true
                  - name: en
                    label: English label
                    type: string
                    required: true
                  - name: url
                    label: Link
                    type: string
                    required: true
              - name: groups
                label: Product groups
                type: object
                fields:
                  - name: shirts
                    label: T-shirts
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string
                      - name: items
                        label: Images
                        component: merch_image
                        list:
                          collapsible:
                            collapsed: true
                            summary: image
                  - name: vinyl
                    label: Vinyl
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string
                      - name: items
                        label: Images
                        component: merch_image
                        list:
                          collapsible:
                            collapsed: true
                            summary: image
                  - name: picks
                    label: Picks
                    type: object
                    fields:
                      - name: title
                        label: Group title
                        component: localized_string

          - name: contacts
            label: Contacts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: hero
                label: Contact images
                type: object
                fields:
                  - name: desktop
                    label: Desktop
                    component: image_upload
                  - name: mobile
                    label: Mobile
                    component: image_upload
              - name: email
                label: Email
                type: string
                required: true
              - name: phone
                label: Phone
                type: string
                required: true
              - name: links
                label: Social links
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.id}"
                fields:
                  - name: id
                    label: Platform
                    type: select
                    options:
                      values:
                        - name: instagram
                          label: Instagram
                        - name: telegram
                          label: Telegram
                        - name: tiktok
                          label: TikTok
                        - name: mail
                          label: Mail
                        - name: youtube
                          label: YouTube
                  - name: url
                    label: URL
                    type: string
                    required: true
