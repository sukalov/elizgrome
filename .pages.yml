media:
  - name: images
    label: Images
    input: src/assets/images
    output: src/assets/images
    extensions: [jpg, jpeg, png, webp]
    rename: safe

components:
  localized_string:
    type: object
    fields:
      - name: en
        label: English
        type: string
        required: true
      - name: ru
        label: Russian
        type: string
        required: true
  localized_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
        required: true
      - name: ru
        label: Russian
        type: text
        required: true
  localized_optional_text:
    type: object
    fields:
      - name: en
        label: English
        type: text
      - name: ru
        label: Russian
        type: text
  image_upload:
    type: image
    description: "Upload jpg, jpeg, png, or webp only. Please keep the image under 1mb."
    options:
      media: images
      extensions: [jpg, jpeg, png, webp]

content:
  - name: landing
    label: Landing page
    type: file
    path: src/content/landing.yaml
    format: yaml
    fields:
      - name: site
        label: Site settings
        type: object
        fields:
          - name: seo
            label: SEO
            type: object
            fields:
              - name: title
                label: Page title
                component: localized_string
              - name: description
                label: Meta description
                component: localized_text
              - name: og_image
                label: OG image
                component: image_upload
          - name: navigation
            label: Navigation
            type: object
            fields:
              - name: logo
                label: Logo text
                component: localized_string
              - name: menu_label
                label: Mobile menu button label
                component: localized_string
              - name: search_label
                label: Search button label
                component: localized_string
              - name: section_links
                label: Internal section links
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.label.en}"
                fields:
                  - name: target
                    label: Section id without #
                    type: string
                    required: true
                  - name: label
                    label: Label
                    component: localized_string
              - name: external_links
                label: External links
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.label.en}"
                fields:
                  - name: url
                    label: URL
                    type: string
                    required: true
                  - name: label
                    label: Label
                    component: localized_string
      - name: sections
        label: Page sections
        type: object
        fields:
          - name: about
            label: About
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: text
                label: About text
                component: localized_text
              - name: photo
                label: Photo
                component: image_upload
          - name: releases
            label: Releases
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: albums
                label: Albums
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en} ({fields.year})"
                fields:
                  - name: title
                    label: Title
                    component: localized_string
                  - name: year
                    label: Year
                    type: string
                    required: true
                  - name: image
                    label: Album image
                    component: image_upload
                  - name: songlist
                    label: Songlist
                    component: localized_optional_text
                    description: "Plain text song list, one song per line."
              - name: songs
                label: Songs
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.album.en} — {fields.title.en}"
                fields:
                  - name: album
                    label: Album
                    component: localized_string
                  - name: title
                    label: Song title
                    component: localized_string
                  - name: lyrics
                    label: Lyrics
                    component: localized_text
          - name: concerts
            label: Concerts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: items
                label: Concert items
                type: object
                list:
                  collapsible:
                    collapsed: true
                    summary: "{fields.title.en}"
                fields:
                  - name: title
                    label: Title
                    component: localized_string
                  - name: link
                    label: Optional link
                    type: string
          - name: merch
            label: Merch
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
          - name: contacts
            label: Contacts
            type: object
            fields:
              - name: title
                label: Section title
                component: localized_string
              - name: email
                label: Email
                type: string
              - name: phone
                label: Phone
                type: string
              - name: address
                label: Address
                component: localized_text
