    text:
      ru: >-
        Лиза Громова (28 лет) – автор и исполнитель, музыкант. 


        Ех-участница проекта ОЗЁРА (2016-2017), выпускалась на лейбле MLBC
        (2018-2019), на данный момент является резидентом лейбла «Диско Клуб». 


        В группе ОЗЁРА была автором и голосом двух ЕР – «В отличие от тебя
        хардкор никогда не умрёт» и «Феррари». 


        В сольном творчестве выпустила три полноценных альбома: «Прелесть»,
        «глупая скучная собака», «без лица бездельница»; и несколько синглов:
        «Зима», «Ледоход», «Одна простая истина», «Романс скрипача». 


        Лиза также работала над совместными фитами, одни из которых были
        записаны и выпущены с группой Би-2, Мальбэк, Синекдоха Монток, тима ищет
        свет и Бомба-Октябрь.
      en: >-
        Liza Gromova (28) is a singer-songwriter and musician.


        She is a former member of the project OZYORA (2016–2017), released music
        through the MLBC label (2018–2019), and is currently a resident artist
        of the Disco Club label.


        As part of OZYORA, she was the songwriter and vocalist behind the two
        EPs Unlike You, Hardcore Will Never Die and Ferrari.


        As a solo artist, she has released three full-length albums: Prelest,
        Glupaya Skuchnaya Sobaka, and Bez Litsa Bezdelnitsa; as well as several
        singles, including Zima, Ledokhod, Odna Prostaya Istina, and Romans
        Skripacha.


        Liza has also worked on a number of collaborative releases. Among them
        are tracks recorded and released with Bi-2, Malbek, Synecdoche Montauk,
        Tima Ishchet Svet, and Bomba-Oktyabr.
