        integral to the development of 1960s counterculture and the recognition
        of popular music as an art form. Rooted in skiffle, beat and 1950s rock
        'n' roll, their sound incorporated elements of classical music and
        traditional pop in innovative ways. They also explored styles ranging
        from folk and Indian music to psychedelia and hard rock. As pioneers in
        recording, songwriting and artistic presentation, the Beatles
        revolutionised many aspects of the music industry and were often
        publicised as leaders of the era's youth and sociocultural movements.
