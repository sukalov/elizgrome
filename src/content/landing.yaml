          ru: Москва-Белград / Ты лети (макси-сингл)
        year: "2026"
        image: src/assets/images/lizagromova-cover-3000x3000.webp
        songs:
          - title:
              en: Москва-Белград
              ru: Москва-Белград
            lyrics: >-
              Уважаемые пассажиры, добро пожаловать на борт нашего самолёта.



              Просим вас занять свои места и убедиться, что ручная кладь надежно
              размещена.



              Пристегните ремни безопасности. 

              Чтобы пристегнуть ремень, вставьте металлический наконечник в
              пряжку.



              Аварийные выходы находятся по обе стороны салона.



              Просим перевести электронные устройства в авиарежим.



              Пожалуйста, убедитесь, что спинка кресла установлена в
              вертикальное положение, столик сложен, подлокотники опущены, а
              ремни безопасности застёгнуты.



              Благодарим вас за внимание.

              Приятного полёта! 



              Ladies and gentlemen, welcome on board our aircraft.



              Please take your seats and ensure that your hand luggage is
              securely stowed.



              Please fasten your seat belts. To fasten the belt, insert the
              metal fitting into the buckle.



              Emergency exits are located on both sides of the cabin.



              We kindly ask you to switch all electronic devices to flight mode.



              Please make sure that your seat back is in the upright position,
              your tray table is stowed, your armrests are down, and your seat
              belt is securely fastened.



              Thank you for your attention. We wish you a pleasant flight!
          - title:
              en: Ты лети
              ru: Ты лети
            lyrics: |-
              Снова мимо лица, 
              Пересадки, пустота.
              Нам по-своему не спится –
              Но мне от грусти и стыда.
              Хотя бы знаю,
              Что не от скуки ты держал меня.
              Город что-то плачет и я слышу каждый всхлип.
              Ты – мой лучший неудачник, мне подумалось на миг. 
              И я таю,
              Будто не зная, что в последний раз смотрю в твои глаза.


              Ты лети, лети,
              Лети и вспоминай 
              Мой пасмурный край, 
              Мой пасмурный край.
              Ты лети, лети,
              Лети и вспоминай 
              Мой пасмурный край, 
              Мой пасмурный край.


              И в который раз за месяц я пишу тебе письмо, 
              Только очень много чуши и всё сводится лишь к «но».
              Я пропадаю
              В этих мокрых душных письмах.
              Ты без адреса, без цели,
              Врёшь, что полюбил в Москву. 
              Я на личный принимаю и опять, 
              Опять бегу!
              Провожаю
              Тебя мыльным детским взглядом.


              Ты лети, лети,
              Лети и вспоминай 
              Мой пасмурный край, 
              Мой пасмурный край.
              Ты лети, лети,
              Лети и вспоминай 
              Мой солнечный край, 
              Мой солнечный край.


              Ты лети, лети! (Лети-лети)
