about:
  text:
    en: Eliz Grome is an independent singer-songwriter creating quiet, cinematic
      music about memory, movement, and the city after dark.
    ru: Элиз Громе — независимая певица и автор песен, создающая тихую
      кинематографичную музыку о памяти, движении и городе после темноты.
services:
  - title:
      en: concerts
      ru: концерты
    description:
      en: Solo and chamber performances for attentive rooms and close-listening
        venues.
      ru: Сольные и камерные выступления для внимательных залов и пространств.
  - title:
      en: Acoustic sets
      ru: Акустические сеты
    description:
      en: Stripped-back arrangements for private events, galleries, and small stages.
      ru: Минималистичные аранжировки для частных событий, галерей и малых сцен.
  - title:
      en: Lyrics and collaborations
      ru: Тексты и коллаборации
    description:
      en: Selected songwriting and vocal collaborations with artists and producers.
      ru: Избранные авторские и вокальные коллаборации с артистами и продюсерами.
